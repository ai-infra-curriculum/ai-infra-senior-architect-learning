name: Validate Learning Repository

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  validate-documentation:
    name: Validate Documentation and Structure
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install markdown-link-check
          pip install yamllint
          pip install mdformat
          pip install pylint

      - name: Validate README structure
        run: |
          echo "Checking main README..."
          if [ ! -f "README.md" ]; then
            echo "ERROR: Main README.md not found"
            exit 1
          fi

          # Check required sections
          grep -q "## Executive Summary" README.md || { echo "Missing Executive Summary"; exit 1; }
          grep -q "## Strategic Learning Outcomes" README.md || { echo "Missing Strategic Learning Outcomes"; exit 1; }
          grep -q "## Curriculum Structure" README.md || { echo "Missing Curriculum Structure"; exit 1; }

          echo "README structure validation passed"

      - name: Validate module structure
        run: |
          echo "Validating module directories..."

          # Required modules
          modules=(
            "mod-401-enterprise-ai-strategy"
            "mod-402-executive-leadership"
            "mod-403-governance-standards"
            "mod-404-innovation-rnd"
            "mod-405-responsible-ai"
            "mod-406-global-infrastructure"
            "mod-407-partnerships-vendors"
            "mod-408-ma-due-diligence"
            "mod-409-thought-leadership"
            "mod-410-future-ai-infra"
          )

          for module in "${modules[@]}"; do
            if [ ! -d "lessons/$module" ]; then
              echo "ERROR: Module directory $module not found"
              exit 1
            fi

            if [ ! -f "lessons/$module/README.md" ]; then
              echo "ERROR: README.md not found in $module"
              exit 1
            fi
          done

          echo "Module structure validation passed"

      - name: Validate project structure
        run: |
          echo "Validating project directories..."

          # Required projects
          projects=(
            "project-401-ai-transformation-strategy"
            "project-402-global-platform-architecture"
            "project-403-responsible-ai-framework"
            "project-404-innovation-program"
            "project-405-thought-leadership"
            "project-406-enterprise-governance"
          )

          for project in "${projects[@]}"; do
            if [ ! -d "projects/$project" ]; then
              echo "ERROR: Project directory $project not found"
              exit 1
            fi

            if [ ! -f "projects/$project/README.md" ]; then
              echo "ERROR: README.md not found in $project"
              exit 1
            fi
          done

          echo "Project structure validation passed"

      - name: Check markdown formatting
        run: |
          echo "Checking markdown formatting..."
          find . -name "*.md" -type f -exec mdformat --check {} + || {
            echo "Markdown formatting issues found. Run: mdformat --wrap 120 ."
            exit 0  # Warning only
          }

      - name: Validate links in documentation
        run: |
          echo "Validating markdown links..."
          find . -name "*.md" -type f -print0 | xargs -0 -I {} markdown-link-check {} || {
            echo "Broken links found (warning only)"
            exit 0  # Warning only
          }

      - name: Check for required files
        run: |
          echo "Checking for required files..."

          required_files=(
            "README.md"
            "CURRICULUM.md"
            "CONTRIBUTING.md"
            "resources/executive-reading-list.md"
            "resources/strategic-tools.md"
            "resources/industry-standards.md"
            "resources/executive-education.md"
          )

          for file in "${required_files[@]}"; do
            if [ ! -f "$file" ]; then
              echo "WARNING: Required file $file not found"
            fi
          done

      - name: Validate strategic content quality
        run: |
          echo "Checking for strategic/executive-level language..."

          # Check for strategic keywords in main README
          strategic_keywords=(
            "strategic"
            "enterprise"
            "executive"
            "business value"
            "transformation"
            "governance"
            "C-suite"
            "board"
          )

          missing_keywords=()
          for keyword in "${strategic_keywords[@]}"; do
            if ! grep -qi "$keyword" README.md; then
              missing_keywords+=("$keyword")
            fi
          done

          if [ ${#missing_keywords[@]} -gt 0 ]; then
            echo "WARNING: Some strategic keywords not found in README: ${missing_keywords[*]}"
          else
            echo "Strategic content validation passed"
          fi

  validate-templates:
    name: Validate Project Templates
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Check for project templates
        run: |
          echo "Checking for project template files..."

          # List of expected template types
          template_types=(
            "strategy"
            "business-case"
            "roadmap"
            "governance"
            "presentation"
          )

          project_dirs=$(find projects -maxdepth 1 -mindepth 1 -type d)

          for dir in $project_dirs; do
            echo "Checking templates in $dir..."

            # Check if templates directory exists
            if [ ! -d "$dir/templates" ]; then
              echo "INFO: No templates directory in $dir (may be added later)"
            fi
          done

          echo "Template validation completed"

  security-scan:
    name: Security and Best Practices Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Check for sensitive information
        run: |
          echo "Scanning for potential sensitive information..."

          # Check for common patterns that shouldn't be in learning materials
          if grep -r "password\s*=\s*['\"]" . --include="*.md" --exclude-dir=".git"; then
            echo "WARNING: Found potential password in documentation"
          fi

          if grep -r "api[_-]key\s*=\s*['\"]" . --include="*.md" --exclude-dir=".git"; then
            echo "WARNING: Found potential API key in documentation"
          fi

          if grep -r "secret\s*=\s*['\"]" . --include="*.md" --exclude-dir=".git"; then
            echo "WARNING: Found potential secret in documentation"
          fi

          echo "Security scan completed"

      - name: Validate professional language
        run: |
          echo "Checking for professional, executive-level language..."

          # Check for informal language that shouldn't appear in executive materials
          informal_patterns=(
            "gonna"
            "wanna"
            "kinda"
            "yeah"
            "nope"
          )

          for pattern in "${informal_patterns[@]}"; do
            if grep -ri "$pattern" . --include="*.md" --exclude-dir=".git"; then
              echo "WARNING: Found informal language: $pattern"
            fi
          done

          echo "Professional language check completed"

  completeness-check:
    name: Check Repository Completeness
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Generate completeness report
        run: |
          echo "=== Repository Completeness Report ==="
          echo ""

          echo "📚 Modules:"
          module_count=$(find lessons -maxdepth 1 -mindepth 1 -type d | wc -l)
          echo "  Found $module_count modules (expected: 10)"

          echo ""
          echo "🎯 Projects:"
          project_count=$(find projects -maxdepth 1 -mindepth 1 -type d | wc -l)
          echo "  Found $project_count projects (expected: 6)"

          echo ""
          echo "📄 Documentation Files:"
          md_count=$(find . -name "*.md" -type f | wc -l)
          echo "  Found $md_count markdown files"

          echo ""
          echo "📊 Resources:"
          resource_count=$(find resources -type f 2>/dev/null | wc -l)
          echo "  Found $resource_count resource files (expected: 4+)"

          echo ""
          echo "✅ Assessment Materials:"
          assessment_count=$(find assessments -type f 2>/dev/null | wc -l)
          echo "  Found $assessment_count assessment files"

          echo ""
          echo "==================================="

  notify-status:
    name: Validation Status Summary
    runs-on: ubuntu-latest
    needs: [validate-documentation, validate-templates, security-scan, completeness-check]
    if: always()

    steps:
      - name: Summary
        run: |
          echo "=== Validation Summary ==="
          echo "All validation checks completed."
          echo "Check individual job results above for details."
          echo "=========================="
